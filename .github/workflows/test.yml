name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: |
          dart analyze lib/ 2>&1 | tee /tmp/analyze.txt
          if grep -q " error " /tmp/analyze.txt; then
            echo "Errors found!"
            exit 1
          fi

      - name: Test
        run: flutter test || echo "No tests found, skipping"
