name: iOS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout flacidal-mobile
        uses: actions/checkout@v4
        with:
          path: flacidal-mobile

      - name: Checkout flacidal-core
        uses: actions/checkout@v4
        with:
          repository: kushiemoon-dev/flacidal-core
          path: flacidal-core

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: Cross-compile Go for iOS arm64
        working-directory: flacidal-core
        run: make ios

      - name: Copy .a + header into iOS project
        working-directory: flacidal-mobile
        run: |
          mkdir -p ios/Runner
          cp ../flacidal-core/build/ios/libflacidal.a ios/Runner/
          cp ../flacidal-core/build/ios/libflacidal.h ios/Runner/

      - name: Install Flutter dependencies
        working-directory: flacidal-mobile
        run: flutter pub get

      - name: Build unsigned IPA
        working-directory: flacidal-mobile
        run: flutter build ipa --no-codesign

      - name: Rename IPA
        working-directory: flacidal-mobile
        run: mv build/ios/ipa/*.ipa FLACidal.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FLACidal-iOS
          path: flacidal-mobile/FLACidal.ipa

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flacidal-mobile/FLACidal.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
