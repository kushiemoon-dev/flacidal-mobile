name: Android Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout flacidal-mobile
        uses: actions/checkout@v4
        with:
          path: flacidal-mobile
          fetch-depth: 0

      - name: Checkout flacidal-core
        uses: actions/checkout@v4
        with:
          repository: kushiemoon-dev/flacidal-core
          path: flacidal-core

      - name: Get version from tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Android NDK
        run: |
          yes | sdkmanager "ndk;29.0.14206865" --sdk_root=$ANDROID_HOME || true
          # Find the actual NDK path
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d -name "29*" | head -1)
          if [ -z "$NDK_PATH" ]; then
            NDK_PATH="$ANDROID_HOME/ndk/29.0.14206865"
          fi
          echo "ANDROID_NDK=$NDK_PATH" >> $GITHUB_ENV
          echo "Found NDK at: $NDK_PATH"
          ls "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep "aarch64.*clang$" | head -3

      - name: Cross-compile Go for Android
        working-directory: flacidal-core
        run: |
          make android-arm64
          make android-arm
          make android-x86_64

      - name: Copy .so files into jniLibs
        run: |
          JNILIBS=flacidal-mobile/android/app/src/main/jniLibs
          mkdir -p $JNILIBS/arm64-v8a $JNILIBS/armeabi-v7a $JNILIBS/x86_64
          cp flacidal-core/build/android/arm64-v8a/libflacidal.so $JNILIBS/arm64-v8a/
          cp flacidal-core/build/android/armeabi-v7a/libflacidal.so $JNILIBS/armeabi-v7a/
          cp flacidal-core/build/android/x86_64/libflacidal.so $JNILIBS/x86_64/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: Install dependencies
        working-directory: flacidal-mobile
        run: flutter pub get

      - name: Build release APK (universal)
        working-directory: flacidal-mobile
        run: flutter build apk --release

      - name: Build per-ABI APKs
        working-directory: flacidal-mobile
        run: flutter build apk --release --split-per-abi

      - name: Rename artifacts
        working-directory: flacidal-mobile
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk FLACidal-${{ steps.version.outputs.tag }}-universal.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk FLACidal-${{ steps.version.outputs.tag }}-arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk FLACidal-${{ steps.version.outputs.tag }}-arm.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk FLACidal-${{ steps.version.outputs.tag }}-x86_64.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FLACidal-${{ steps.version.outputs.tag }}
          path: flacidal-mobile/FLACidal-*.apk

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        working-directory: flacidal-mobile
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ steps.version.outputs.tag }}" ]; then
            CHANGES=$(git log --pretty=format:"- %s" -20)
          else
            CHANGES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          cat > /tmp/changelog.md << CHEOF
          ## FLACidal Mobile ${{ steps.version.outputs.tag }}

          ### Changes
          ${CHANGES}

          ### Downloads
          | File | Architecture |
          |------|-------------|
          | FLACidal-${{ steps.version.outputs.tag }}-universal.apk | All (larger) |
          | FLACidal-${{ steps.version.outputs.tag }}-arm64.apk | ARM64 (most devices) |
          | FLACidal-${{ steps.version.outputs.tag }}-arm.apk | ARM32 (older devices) |
          | FLACidal-${{ steps.version.outputs.tag }}-x86_64.apk | x86_64 (emulators) |

          ### Install
          Download the APK for your architecture (arm64 for most phones) and install directly.
          CHEOF

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: FLACidal Mobile ${{ steps.version.outputs.tag }}
          body_path: /tmp/changelog.md
          files: flacidal-mobile/FLACidal-*.apk
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
